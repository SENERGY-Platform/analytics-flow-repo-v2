name: 'Build & Upload'

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
jobs:
  multi:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          release_branches: ".*"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace version in docs/swagger.json
        uses: richardrigutins/replace-in-files@v2
        with:
          files: 'docs/swagger.json'
          search-text: '{version}'
          replacement-text: ${{ steps.tag_version.outputs.new_tag }}
      - name: Replace version in main.go
        uses: richardrigutins/replace-in-files@v2
        with:
          files: 'main.go'
          search-text: '{version}'
          replacement-text: ${{ steps.tag_version.outputs.new_tag }}
      -
        name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.tag_version.outputs.new_tag }}
          tags: |
            ghcr.io/senergy-platform/analytics-flow-repo-v2:latest
            ghcr.io/senergy-platform/analytics-flow-repo-v2:${{ steps.tag_version.outputs.new_tag }}